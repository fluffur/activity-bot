name: Deploy Activity Bot

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push App image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/prod/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/activity-bot-app:latest
            ghcr.io/${{ github.repository_owner }}/activity-bot-app:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Migrate image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/migrate/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/activity-bot-migrate:latest
            ghcr.io/${{ github.repository_owner }}/activity-bot-migrate:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to VDS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            set -e
            echo "Starting deployment..."
            cd /root/activity-bot

            mkdir -p backups
            ls -1t backups/*.sql 2>/dev/null | tail -n +4 | xargs -r rm -f
            TIMESTAMP=$(date +'%Y%m%d%H%M%S')
            echo "Creating database backup..."
            docker exec activity_db pg_dump -U postgres activity > backups/activity_$TIMESTAMP.sql
            echo "Backup saved as backups/activity_$TIMESTAMP.sql"

            echo "Pull latest code..."
            git fetch --all
            git reset --hard origin/master

            echo "Login to GHCR..."
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            echo "Pull latest images..."
            docker compose -f docker-compose.prod.yml pull

            echo "Restart services..."
            docker compose -f docker-compose.prod.yml up -d app

            echo "Waiting for database..."
            until docker exec activity_db pg_isready -U postgres; do
              sleep 2
            done

            echo "Run migrations..."
            docker compose -f docker-compose.prod.yml run --rm migrate up

            echo "Deployment finished!"
