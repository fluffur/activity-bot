name: Deploy Activity Bot

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/prod/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VDS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          script: |
            set -e
            cd /root/activity-bot

            mkdir -p backups
            ls -1t backups/*.sql 2>/dev/null | tail -n +4 | xargs -r rm -f

            TIMESTAMP=$(date +'%Y%m%d%H%M%S')
            docker exec activity_db pg_dump -U postgres activity > backups/activity_$TIMESTAMP.sql

            echo "Pull new image..."
            docker compose -f docker-compose.prod.yml pull

            echo "Restart containers..."
            docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for database..."
            until docker exec activity_db pg_isready -U postgres; do
              sleep 2
            done

            echo "Run migrations..."
            docker compose -f docker-compose.prod.yml exec app ./migrate up

            echo "Deployment finished!"