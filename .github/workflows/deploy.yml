name: Deploy Activity Bot

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VDS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          script: |
            set -e
            echo "Starting deployment..."
            cd /root/activity-bot

            mkdir -p backups
            ls -1t backups/*.sql 2>/dev/null | tail -n +4 | xargs -r rm -f || true
            TIMESTAMP=$(date +'%Y%m%d%H%M%S')
            
            echo "Creating database backup..."
            if docker ps | grep -q activity_db; then
              docker exec activity_db pg_dump -U postgres activity > backups/activity_$TIMESTAMP.sql || true
              echo "Backup saved as backups/activity_$TIMESTAMP.sql"
            else
              echo "Database container not running, skipping backup."
            fi

            echo "Pull latest code..."
            git fetch --all
            git reset --hard origin/master

            echo "Build and Restart services..."
            docker compose -f docker-compose.prod.yml up --build -d app

            echo "Waiting for database..."
            until docker exec activity_db pg_isready -U postgres; do
              sleep 2
            done

            echo "Run migrations..."
            docker compose -f docker-compose.prod.yml run --rm migrate up

            echo "Deployment finished!"
