version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "internal/db/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        json_tags_case_style: camel
        emit_db_tags: true
        emit_prepared_queries: false
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - column: "chat_members.emoji_json"
            go_type:
              import: "activity-bot/internal/model"
              type: "Emojis"
          - column: "users.emoji_json"
            go_type:
              import: "activity-bot/internal/model"
              type: "Emojis"