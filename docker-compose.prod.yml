services:
  app:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./data:/app/data

  db:
    image: postgres:16-alpine
    container_name: activity_db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: activity
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: activity_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data

  migrate:
    build:
      context: .
      dockerfile: docker/migrate/Dockerfile
    container_name: activity_migrate
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./migrations:/app/migrations
    entrypoint: [ "./migrate" ]

  loki:
    image: grafana/loki:3.0.0
    container_name: activity_loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml
      - lokidata:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    container_name: activity_promtail
    volumes:
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: activity_grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafanadata:/var/lib/grafana
    restart: unless-stopped

volumes:
  pgdata:
    name: activity_pgdata
  redisdata:
    name: activity_redisdata
  lokidata:
    name: activity_lokidata
  grafanadata:
    name: activity_grafanadata