services:
  app:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    ports:
      - "127.0.0.1:8081:8080"

  db:
    image: postgres:16-alpine
    container_name: activity_db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: activity
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: activity_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data

  migrate:
    build:
      context: .
      dockerfile: docker/migrate/Dockerfile
    container_name: activity_migrate
    env_file:
      - .env
    depends_on:
      - db
    entrypoint: [ "./migrate" ]

volumes:
  pgdata:
    name: activity_pgdata
  redisdata:
    name: activity_redisdata